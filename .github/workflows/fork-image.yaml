# Fork image build — publishes a ready-to-run image to the fork's GHCR so a VPS
# can `docker pull` it without building from source. Temporary: while the fork's
# features (ru locale, telegram reactions) are not yet in an upstream release.
# Once they land upstream, switch the VPS to ghcr.io/nextlevelbuilder/goclaw and
# delete this workflow.
name: fork image

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: fork-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:dev-${{ github.sha }}
          build-args: |
            ENABLE_EMBEDUI=true
            ENABLE_PYTHON=true
            ENABLE_OTEL=false
            ENABLE_FULL_SKILLS=false
            VERSION=fork-dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
