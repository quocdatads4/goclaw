name: Sync with Upstream

on:
  schedule:
    # Chạy mỗi 6 tiếng một lần
    - cron: '0 */6 * * *'
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  sync:
    name: Sync fork with nextlevelbuilder/goclaw
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/nextlevelbuilder/goclaw.git || true
          git remote set-url upstream https://github.com/nextlevelbuilder/goclaw.git

      - name: Fetch upstream
        run: git fetch upstream --tags

      - name: Sync dev branch
        run: |
          git checkout dev
          git merge upstream/dev --ff-only || git merge upstream/dev -m "chore: sync with upstream nextlevelbuilder/goclaw"
          git push origin dev

      - name: Sync tags
        run: git push origin --tags --force
