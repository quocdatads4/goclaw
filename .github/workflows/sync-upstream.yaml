name: Sync with Upstream

on:
  schedule:
    # Chạy mỗi giờ — bắt kịp ngay khi upstream nextlevelbuilder/goclaw có commit mới
    - cron: '0 * * * *'
  workflow_dispatch: # Cho phép chạy thủ công bất kỳ lúc nào

jobs:
  sync:
    name: Sync fork with nextlevelbuilder/goclaw
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/nextlevelbuilder/goclaw.git || true
          git remote set-url upstream https://github.com/nextlevelbuilder/goclaw.git

      - name: Fetch upstream
        run: git fetch upstream --tags

      - name: Check for new upstream commits
        id: check
        run: |
          git checkout main
          UPSTREAM_SHA=$(git rev-parse upstream/dev)
          LOCAL_SHA=$(git rev-parse HEAD)
          echo "upstream=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "local=$LOCAL_SHA" >> $GITHUB_OUTPUT
          if [ "$UPSTREAM_SHA" = "$LOCAL_SHA" ]; then
            echo "behind=false" >> $GITHUB_OUTPUT
            echo "No new commits from upstream. Skipping sync."
          else
            BEHIND=$(git rev-list HEAD..upstream/dev --count)
            echo "behind=true" >> $GITHUB_OUTPUT
            echo "Fork is $BEHIND commit(s) behind upstream. Syncing..."
          fi

      - name: Sync main branch
        if: steps.check.outputs.behind == 'true'
        run: |
          git checkout main
          git merge upstream/dev --ff-only || git merge upstream/dev -m "chore: sync with upstream nextlevelbuilder/goclaw"
          git push origin main

      - name: Sync tags
        if: steps.check.outputs.behind == 'true'
        run: git push origin --tags --force
